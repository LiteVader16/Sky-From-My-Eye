<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Matrix</title>
    <style>
        body {
            background-color: #111;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: transparent;
            aspect-ratio: 3 / 4; 
            perspective: 1000px; 
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s; 
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg); 
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; 
            backface-visibility: hidden;
            border-radius: 4px;
            overflow: hidden;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .card-back {
            background-color: #222;
            color: #fff;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-back p {
            margin: 8px 0;
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
