<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Matrix</title>
    <style>
        body {
            background-color: #111;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 5px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: transparent;
            aspect-ratio: 3 / 4; 
            perspective: 1000px; 
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s; 
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg); 
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; 
            backface-visibility: hidden;
            border-radius: 4px;
            overflow: hidden;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .card-back {
            background-color: #222;
            color: #fff;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-back p {
            margin: 8px 0;
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <!-- This empty box is where the script will automatically build your cards -->
    <div class="matrix" id="photo-matrix"></div>

    <script>
        // 1. YOUR PHOTO DATA LIST
        // To add more photos later, simply add a new line inside these brackets.
        const skyData = [
            { file: "sky_01.jpg", location: "Location 1", time: "Date/Time 1", notes: "Your notes here" },
            { file: "sky_02.jpg", location: "Location 2", time: "Date/Time 2", notes: "Your notes here" },
            { file: "sky_03.jpg", location: "Location 3", time: "Date/Time 3", notes: "Your notes here" },
            { file: "sky_04.jpg", location: "Location 4", time: "Date/Time 4", notes: "Your notes here" },
            { file: "sky_05.jpg", location: "Location 5", time: "Date/Time 5", notes: "Your notes here" },
            { file: "sky_06.jpg", location: "Location 6", time: "Date/Time 6", notes: "Your notes here" },
            { file: "sky_07.jpg", location: "Location 7", time: "Date/Time 7", notes: "Your notes here" },
            { file: "sky_08.jpg", location: "Location 8", time: "Date/Time 8", notes: "Your notes here" },
            { file: "sky_09.jpg", location: "Location 9", time: "Date/Time 9", notes: "Your notes here" },
            { file: "sky_10.jpg", location: "Location 10", time: "Date/Time 10", notes: "Your notes here" },
            { file: "sky_11.jpg", location: "Location 11", time: "Date/Time 11", notes: "Your notes here" }
        ];

        // 2. THE AUTOMATION SCRIPT
        // You never need to touch anything below this line. 
        const matrixContainer = document.getElementById('photo-matrix');

        skyData.forEach(photo => {
            const cardHTML = `
                <div class="card" onclick="this.classList.toggle('flipped')">
                    <div class="card-inner">
                        <div class="card-front">
                            <!-- Notice it automatically points to your "Sky Photos" folder -->
                            <img src="Sky Photos/${photo.file}" alt="Sky photo">
                        </div>
                        <div class="card-back">
                            <p><strong>Location:</strong> ${photo.location}</p>
                            <p><strong>Time:</strong> ${photo.time}</p>
                            <p><strong>Notes:</strong> ${photo.notes}</p>
                        </div>
                    </div>
                </div>
            `;
            matrixContainer.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
