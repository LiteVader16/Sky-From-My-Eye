<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Matrix</title>
    <style>
        body {
            background-color: #111;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: transparent;
            aspect-ratio: 3 / 4; 
            perspective: 1000px; 
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s; 
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg); 
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; 
            backface-visibility: hidden;
            border-radius: 4px;
            overflow: hidden;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .card-back {
            background-color: #222;
            color: #fff;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-back p {
            margin: 8px 0;
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="matrix" id="photo-matrix"></div>

    <!-- THIS IS THE NEW LINK: It grabs your exported file automatically -->
    <script src="sky_data.js"></script>

    <script>
        // The script now builds the matrix using the data from sky_data.js
        const matrixContainer = document.getElementById('photo-matrix');

        skyData.forEach(photo => {
            const cardHTML = `
                <div class="card" onclick="this.classList.toggle('flipped')">
                    <div class="card-inner">
                        <div class="card-front">
                            <img src="Sky Photos/${photo.file}" alt="Sky photo">
                        </div>
                        <div class="card-back">
                            <p><strong>Location:</strong> ${photo.location}</p>
                            <p><strong>Time:</strong> ${photo.time}</p>
                            <p><strong>Notes:</strong> ${photo.notes}</p>
                        </div>
                    </div>
                </div>
            `;
            matrixContainer.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
